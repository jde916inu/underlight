<style>
  html, body { background: #FFFFFF; color: #1A1408; -webkit-font-smoothing:antialiased; }
  body { font-family: Pretendard, system-ui, sans-serif; padding-bottom: env(safe-area-inset-bottom); }
  /* page wrapper for desktop */
  .page-shell {
    max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative;
    background:
      radial-gradient(900px 500px at 50% -120px, rgba(255,179,71,0.12), transparent 60%),
      radial-gradient(700px 600px at 100% 30%, rgba(199,120,0,0.04), transparent 70%),
      #FFFFFF;
    overflow: hidden;
  }
  /* subtle paper grain */
  .grain::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1; opacity:.04; mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.5 0 0 0 0 0.4 0 0 0 0 0.2 0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }
  @keyframes pulse-amber{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,179,71,.55), 0 10px 30px rgba(255,179,71,.25)}
    50%   { box-shadow:0 0 0 10px rgba(255,179,71,0), 0 14px 40px rgba(255,179,71,.15)}
  }
  @keyframes shimmer{ 0%{transform:translateX(-100%)} 100%{transform:translateX(120%)} }
  @keyframes marquee{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
  @keyframes flicker{
    0%,18%,22%,25%,53%,57%,100%{opacity:1}
    20%,24%,55%{opacity:.4}
  }
  @keyframes blink{ 0%,49%{opacity:1} 50%,100%{opacity:0.2} }
  .pulse{ animation: pulse-amber 2.6s ease-in-out infinite }
  .shimmer{position:relative; overflow:hidden}
  .shimmer::after{content:""; position:absolute; inset:0;
    background:linear-gradient(110deg, transparent 30%, rgba(255,255,255,.55) 50%, transparent 70%);
    animation: shimmer 3.2s infinite;
  }
  .blink{ animation: blink 1s step-end infinite }
  .marquee-track{ animation: marquee 24s linear infinite }
  .flicker-dot{ animation: flicker 4.5s infinite }
  /* hero grid */
  .hero-grid{
    background-image:
      linear-gradient(#1A1408 1px, transparent 1px),
      linear-gradient(90deg, #1A1408 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(ellipse at 50% 30%, black 25%, transparent 75%);
    opacity:.04;
  }
  .light-streak{
    background: linear-gradient(90deg, transparent, #C77800, transparent);
    height: 1px; filter: blur(.5px); opacity:.45;
  }
  /* placeholder hatch */
  .hatch{
    background-image: repeating-linear-gradient(135deg, transparent 0, transparent 14px,
      rgba(26,20,8,0.06) 14px, rgba(26,20,8,0.06) 15px);
  }
  /* photo treatments */
  .ph-fade::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.55) 70%, #FFFFFF 100%);
  }
  .ph-warm{
    filter: contrast(1.05) saturate(1.05) brightness(.92);
    transform: scale(1.08);
    transform-origin: center 55%;
  }
  .ph-veil::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,255,255,0) 30%, rgba(255,255,255,.7) 100%);
  }
  /* testimonial scroller */
  .scroll-x{ scroll-snap-type: x mandatory; scrollbar-width: none }
  .scroll-x::-webkit-scrollbar{display:none}
  .scroll-x > *{ scroll-snap-align: start }
  .testi-scroll{
    scroll-snap-type: x mandatory;
    scroll-padding-left: 20px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-x: contain;
  }
  .testi-scroll::-webkit-scrollbar{ display:none }
  .testi-card{
    scroll-snap-align: start;
    scroll-snap-stop: always;
    transition: transform .4s cubic-bezier(.2,.7,.2,1), box-shadow .4s ease;
  }
  .testi-card:hover{ transform: translateY(-3px); box-shadow: 0 14px 30px rgba(199,120,0,.18); }
  /* sticky cta gradient veil */
  .cta-veil{
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.92) 35%, #FFFFFF 100%);
  }
  /* number ticker */
  @keyframes pop-in{ 0%{opacity:0; transform:translateY(8px)} 100%{opacity:1; transform:translateY(0)} }
  .pop-in{ animation: pop-in .5s ease-out both }
  /* Reveal */
  .reveal{ transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1) }
  .reveal.pre{ opacity:0; transform:translateY(16px) }
  .reveal.in{ opacity:1; transform:translateY(0) }

  /* Custom select-like price pill */
  .ring-amber-glow{ box-shadow: 0 0 0 1px #FFB347, 0 0 28px rgba(255,179,71,.25) inset, 0 0 24px rgba(255,179,71,.15) }

  /* ── CTA buttons ──────────────────────────────────────────── */
  @keyframes cta-sheen{
    0%   { transform: translateX(-130%) skewX(-18deg); opacity: 0; }
    8%   { opacity: .45; }
    24%  { transform: translateX(240%)  skewX(-18deg); opacity: 0; }
    100% { transform: translateX(240%)  skewX(-18deg); opacity: 0; }
  }
  /* body CTA — simple amber pill that sits in the text flow */
  .cta-soft{

  ];

  /* ── 구글시트 CSV 파싱 + 회차별 그룹핑 ───────────────────── */
  function parseCSV(text){
    const rows = []; let row = [], field = '', inQ = false;
    for (let i=0; i<text.length; i++){
      const c = text[i];
      if (inQ){
        if (c === '"'){ if (text[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
        else field += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if (c === '\r'){ /* skip */ }
        else field += c;
      }
    }
    if (field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.some(c => String(c).trim() !== ''));
  }

  function buildRounds(text){
    const rows = parseCSV(text);
    if (!rows.length) return [];
    // 헤더 행이 있으면 이름매칭, 없으면(자동기록 시트) 고정 순서로 읽음
    const hasHeader = /회차|날짜|상태|성별|나이|직업/.test((rows[0] || []).join('|'));
    let col, data;
    if (hasHeader) {
      const header = rows[0].map(h => String(h).trim());
      const find = (...names) => header.findIndex(h => names.some(n => h.replace(/\s/g,'').includes(n)));
      col = {
        round: find('회차'), date: find('날짜'), time: find('시간'), place: find('장소'),
        status: find('상태'), gender: find('성별'), age: find('나이'), height: find('키'),
        job: find('직업'), remain: find('잔여','자리'), charm: find('매력','한마디'),
      };
      data = rows.slice(1);
    } else {
      // 고정 순서: 회차,날짜,시간,장소,상태,성별,나이대,키,직업,잔여,매력
      col = { round:0, date:1, time:2, place:3, status:4, gender:5, age:6, height:7, job:8, remain:9, charm:10 };
      data = rows;
    }
    const map = {}; const order = [];
    data.forEach(r => {
      const g = (s) => col[s] >= 0 ? String(r[col[s]] || '').trim() : '';
      const key = g('round') || g('date');
      if (!key) return;
      if (!map[key]){
        map[key] = {
          date: g('date') || key, time: g('time'), place: g('place'),
          status: normStatus(g('status')), males: [], females: [], remainF: g('remain'),
        };
        order.push(key);
      }
      const round = map[key];
      if (g('remain') && !round.remainF) round.remainF = g('remain');
      const chip = [g('age'), g('height'), g('job')].filter(Boolean).join('·');
      if (!chip) return;
      const entry = { chip, charm: g('charm') };
      const gender = g('gender');
      if (/남|^M/i.test(gender)) round.males.push(entry);
      else if (/여|^F|^W/i.test(gender)) round.females.push(entry);
    });
    return order.map(k => map[k]);
  }
  function normStatus(s){
    s = String(s||'').trim();
    if (/마감|종료|closed/i.test(s)) return 'closed';
    if (/모집|오픈|진행|open/i.test(s)) return 'open';

  /* ─────── Scroll-driven horizontal pan for testimonials ─────── */
  function useTestiPan(){
    useEffect(()=>{
      const section = document.querySelector('[data-screen-label="05 Testimonials"]');
      const track = section && section.querySelector('.testi-scroll');
      if(!section || !track) return;
      let raf = 0;
      let userScrolling = false;
      let userTimer = 0;
      const onUser = () => {
        userScrolling = true;
        clearTimeout(userTimer);
        userTimer = setTimeout(()=>{ userScrolling = false; }, 900);
      };
      track.addEventListener('pointerdown', onUser);
      track.addEventListener('touchstart', onUser, { passive:true });
      track.addEventListener('wheel', onUser, { passive:true });
      const update = () => {
        raf = 0;
        if(userScrolling) return;
        const rect = section.getBoundingClientRect();
        const vh = window.innerHeight;
        const total = rect.height + vh;
        const p = Math.min(1, Math.max(0, (vh - rect.top) / total));
        const max = track.scrollWidth - track.clientWidth;
        if(max <= 0) return;
        track.scrollLeft = Math.round(max * p);
      };
      const onScroll = () => { if(!raf) raf = requestAnimationFrame(update); };
      window.addEventListener('scroll', onScroll, { passive:true });
      window.addEventListener('resize', onScroll);
      update();
      return () => {
        window.removeEventListener('scroll', onScroll);
        window.removeEventListener('resize', onScroll);
        track.removeEventListener('pointerdown', onUser);
        track.removeEventListener('touchstart', onUser);
        track.removeEventListener('wheel', onUser);
        clearTimeout(userTimer);
        if(raf) cancelAnimationFrame(raf);
      };
    },[]);
  }

  /* ─────── Reveal hook (with safe fallback) ─────── */
  function useReveal(){
    useEffect(()=>{
      const els = Array.from(document.querySelectorAll('.reveal'));
      els.forEach(el => el.classList.add('pre'));
      const showAll = () => els.forEach(el => { el.classList.remove('pre'); el.classList.add('in'); });
      const fallback = setTimeout(showAll, 1400);
      try {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if(e.isIntersecting){
              e.target.classList.remove('pre'); e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold:.06, rootMargin:'0px 0px -8% 0px' });
        els.forEach(el => io.observe(el));
        return () => { clearTimeout(fallback); io.disconnect(); }
      } catch(e){ showAll(); return () => clearTimeout(fallback); }
    },[]);
  }

  /* ─────── Countdown to next Friday 19:00 ─────── */
  function useCountdown(){
    const target = useMemo(()=>{
      const now = new Date();
      const d = new Date(now);
      const day = now.getDay(); // 0 Sun .. 5 Fri
      let add = (5 - day + 7) % 7;
      if(add === 0 && now.getHours() >= 19) add = 7;
      d.setDate(now.getDate() + add);
      d.setHours(19,0,0,0);
      return d;
    },[]);
    const [now, setNow] = useState(Date.now());
    useEffect(()=>{ const i = setInterval(()=>setNow(Date.now()), 1000); return ()=>clearInterval(i); },[]);
    const diff = Math.max(0, target - now);
    const d = Math.floor(diff/86400000);
    const h = Math.floor(diff/3600000) % 24;
    const m = Math.floor(diff/60000) % 60;
    const s = Math.floor(diff/1000) % 60;
    return { d, h, m, s, target };
  }

            <span className="ar text-[16px] leading-none">→</span>

          <div className="mt-4 text-[11px] text-muted font-mono">
            응답 시간 약 1분 · 안전하게 결제하기
          </div>
        </div>
      </section>
    );
  }

          상호 언더라이트 &nbsp;·&nbsp; 대표 장동은<br/>
          사업자등록번호 608-32-71203<br/>
          TEL 070-4577-7548 &nbsp;·&nbsp; Email jde916@naver.com

  /* ─────── Sticky Bottom CTA ─────── */
  function Sticky({ onCTA }){
    return (
      <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 cta-veil pt-8 pb-4 px-4 pointer-events-none">
        <div className="pointer-events-auto">
          <button onClick={onCTA} className="cta-bar active:scale-[0.997] transition">
            <span className="flex items-center justify-center gap-2.5 py-[15px] px-5">
              <span className="text-white font-extrabold text-[15.5px] tracking-[0.01em]">지금 바로 신청하기</span>
              <span className="ar text-white text-[15px] leading-none">→</span>
            </span>
          </button>
          <div className="text-center text-[11px] text-muted mt-2">30초면 끝 · 금·토 저녁 8시 40분 · 풍산역 5분</div>

  /* ─────── 파일 선택 필드 ─────── */
  function FileField({ file, onPick, accept, hint }){
    const id = useMemo(() => 'f' + Math.random().toString(36).slice(2,8), []);
    return (
      <div>
        <input id={id} type="file" accept={accept} className="hidden"
          onChange={e => onPick(e.target.files && e.target.files[0] ? e.target.files[0] : null)} />
        <label htmlFor={id}
          className="flex items-center gap-2 w-full bg-ink2/60 border border-line border-dashed rounded-2xl px-4 py-3 cursor-pointer">
          <span className="text-[12.5px] text-amber font-bold whitespace-nowrap">파일 선택</span>
          <span className={"text-[12px] truncate " + (file ? "text-fg2" : "text-muted")}>{file ? file.name : hint}</span>
        </label>
      </div>
    );
  }

  /* ─────── 신청 + 결제 모달 ─────── */
  function ApplyModal({ open, onClose }){
    const firstOpen = ROUNDS.find(r => !r.soldout);
    const [rounds, setRounds] = useState(ROUNDS);   // 회차: /api/rounds 동적 로드 (실패 시 하드코딩 폴백)
    const [lineupRounds, setLineupRounds] = useState([]);  // 잔여석 계산용
    const [gender, setGender] = useState(null);     // 'M' | 'F'
    const [name, setName]     = useState('');
    const [phone, setPhone]   = useState('');
    const [roundId, setRoundId] = useState(firstOpen ? firstOpen.id : '');
    const [birthYear, setBirthYear] = useState('');   // 년생 (예: 1995)
    const [height, setHeight]       = useState('');   // 키
    const [charm, setCharm]         = useState('');   // 본인의 매력 한마디
    const [workplace, setWorkplace] = useState('');   // 직장명/사업자명
    const [region, setRegion]       = useState('');   // 거주지역
    const [avoidName, setAvoidName] = useState('');   // 겹치고 싶지 않은 지인
    const [drink, setDrink]         = useState('');   // 음료
    const [photoFile, setPhotoFile] = useState(null); // 본인사진
    const [docFile, setDocFile]     = useState(null); // 신원확인 서류
    const [companion, setCompanion]       = useState(false);  // 동반 참여 여부
    const [companionName, setCompanionName] = useState('');   // 같이 오는 분
    const [agreeParty, setAgreeParty]     = useState(false);  // 파티 이용 약관
    const [agreePrivacy, setAgreePrivacy] = useState(false);  // 개인정보 동의
    const [busy, setBusy]     = useState(false);
    const [err, setErr]       = useState('');

    const REGIONS = ['일산', '김포', '파주', '그외지역'];
    const DRINKS = ['아메리카노 (hot)', '아메리카노 (ice)', '자몽 티 (hot)', '자몽 티 (ice)', '사과 라벤더 티 (hot)', '민트 티 (hot)', '민트 티 (ice)'];

    useEffect(() => {
      if (open) { document.body.style.overflow = 'hidden'; }
      else { document.body.style.overflow = ''; }
      return () => { document.body.style.overflow = ''; };
    }, [open]);

    // 회차 동적 로드 (admin에서 관리한 회차) — 모달 열릴 때
    useEffect(() => {
      if (!open) return;
      fetch('/api/rounds').then(r => r.json()).then(j => {
        if (j && j.rounds && j.rounds.length) {
          const today0 = new Date(); today0.setHours(0,0,0,0);
          const parseRoundDate = r => {
            const m = String(r.label||'').match(/(\d{1,2})\/(\d{1,2})/);
            if (!m) return null;
            const yr = today0.getFullYear();
            let d = new Date(yr, parseInt(m[1],10)-1, parseInt(m[2],10));
            if (d.getTime() < today0.getTime() - 180*24*60*60*1000) d = new Date(yr+1, parseInt(m[1],10)-1, parseInt(m[2],10));
            return d;
          };
          const visible = j.rounds.filter(r => {
            if (r.hideLineup) return false;
            const d = parseRoundDate(r);
            return !d || d.getTime() >= today0.getTime();
          });
          setRounds(visible);
          setRoundId(prev => {
            if (visible.some(r => r.id === prev && !r.soldout)) return prev;
            const fo = visible.find(r => !r.soldout);
            return fo ? fo.id : '';
          });
        }
      }).catch(() => {});
      fetch('/api/lineup').then(r => r.json()).then(j => {
        setLineupRounds((j && j.rounds) || []);
      }).catch(() => {});
    }, [open]);

    // 얼리버드/잔여석 배지 — 이벤트 7일 전까지 얼리버드, 이후 잔여석
    const ROUND_CAPACITY = 10;
    const getRoundBadge = (r) => {
      const m = r.label.match(/(\d{1,2})\/(\d{1,2})/);
      if (!m) return null;
      const year = new Date().getFullYear();
      const eventDate = new Date(year, parseInt(m[1]) - 1, parseInt(m[2]));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      if (eventDate < today) return null;
      const daysToEvent = Math.ceil((eventDate - today) / 86400000);
      const daysToDeadline = daysToEvent - 7;
      if (daysToDeadline > 0) {
        return { type: 'earlybird', text: `‼️할인 마감 D-${daysToDeadline}‼️` };
      }
      const lr = lineupRounds.find(x => x.roundId === r.id);
      if (gender === 'M' || gender === 'F') {
        const cnt = gender === 'M' ? (lr ? lr.males.length : 0) : (lr ? lr.females.length : 0);
        return { type: 'seats', text: `🚨[잔여석 ${Math.max(0, ROUND_CAPACITY - cnt)}개] 곧 마감🚨` };
      }
      // 성별 미선택: 남녀 중 잔여석 적은 쪽 기준
      const mCnt = lr ? lr.males.length : 0;
      const fCnt = lr ? lr.females.length : 0;
      const minRem = Math.max(0, ROUND_CAPACITY - Math.max(mCnt, fCnt));
      return { type: 'seats', text: `🚨[잔여석 ${minRem}개] 곧 마감🚨` };
    };

    if (!open) return null;

    const basePrice = gender ? PRICES[gender] : null;
    const round = rounds.find(r => r.id === roundId);
    const isEarlybird = (() => {
      if (!round) return false;
      const m = round.label.match(/(\d{1,2})\/(\d{1,2})/);
      if (!m) return false;
      const eventDate = new Date(new Date().getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
      const today = new Date(); today.setHours(0, 0, 0, 0);
      return Math.ceil((eventDate - today) / 86400000) > 7;
    })();
    const discount = (companion ? COMPANION_DISCOUNT : 0) + (isEarlybird ? EARLYBIRD_DISCOUNT : 0);
    const price = basePrice == null ? null : Math.max(0, basePrice - discount);

    const fmtPhone = (v) => {
      const d = v.replace(/\D/g, '').slice(0, 11);
      if (d.length < 4) return d;
      if (d.length < 8) return d.slice(0,3) + '-' + d.slice(3);
      return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
    };

    const validBirth = /^\d{4}$/.test(birthYear) && +birthYear >= 1950 && +birthYear <= 2010;
    const validHeight = /^\d{2,3}$/.test(height) && +height >= 130 && +height <= 220;
    // 비어있는 첫 항목을 콕 집어 알려줌
    const missing = (
      !roundId ? '참가 회차를 선택해주세요.' :
      !gender ? '성별을 선택해주세요.' :
      name.trim().length < 2 ? '이름을 입력해주세요.' :
      phone.replace(/\D/g,'').length !== 11 ? '휴대폰 번호 11자리를 정확히 입력해주세요.' :
      !validBirth ? '출생연도를 4자리로 정확히 입력해주세요. (예: 1995)' :
      !validHeight ? '키를 숫자로 정확히 입력해주세요. (예: 175)' :
      !charm.trim() ? '"나를 한마디로 표현하자면?" 답변을 입력해주세요.' :
      !workplace.trim() ? '하는 일 / 공부를 입력해주세요.' :
      !region ? '거주지역을 선택해주세요.' :
      !drink ? '드시고 싶은 음료를 선택해주세요.' :
      !photoFile ? '본인 사진을 첨부해주세요.' :
      !docFile ? '재직증명서 / 사업자등록증을 첨부해주세요.' :
      !agreeParty ? '파티 안내 동의에 체크해주세요.' :
      !agreePrivacy ? '개인정보 수집·이용 동의에 체크해주세요.' :
      ''
    );
    const valid = !missing;

    // 파일 → (이미지면 압축) base64
    const fileToUpload = (file) => new Promise((resolve, reject) => {
      if (!/^image\//.test(file.type)) {
        const r = new FileReader();
        r.onload = () => resolve({ b64: String(r.result).split(',')[1], type: file.type || 'application/octet-stream', name: file.name || 'file' });
        r.onerror = reject; r.readAsDataURL(file); return;
      }
      const img = new Image(); const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        const max = 1600; let w = img.width, h = img.height;
        if (w > max || h > max) { const s = max / Math.max(w, h); w = Math.round(w*s); h = Math.round(h*s); }
        const c = document.createElement('canvas'); c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = c.toDataURL('image/jpeg', 0.82);
        resolve({ b64: dataUrl.split(',')[1], type: 'image/jpeg', name: (file.name || 'photo').replace(/\.\w+$/, '') + '.jpg' });
      };
      img.onerror = reject; img.src = url;
    });
    const uploadFile = async (file) => {
      const f = await fileToUpload(file);
      const res = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filename: f.name, contentType: f.type, dataBase64: f.b64 }) });
      const j = await res.json();
      if (!res.ok || !j.url) throw new Error(j.error || '업로드 실패');
      return j.url;
    };

    const pay = async () => {
      setErr('');
      if (!valid) { setErr(missing || '필수 항목·첨부파일·약관 동의를 모두 완료해주세요.'); return; }
      setBusy(true);
      try {
        // 1) 첨부파일 업로드
        let photoUrl = '', docUrl = '';
        try {
          photoUrl = await uploadFile(photoFile);
          docUrl = await uploadFile(docFile);
        } catch (ue) {
          setBusy(false);
          setErr('첨부파일 업로드에 실패했어요. 파일을 다시 확인해주세요. (' + (ue.message || ue) + ')');
          return;
        }
        const orderId = 'UL_' + roundId + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
        const phoneDigits = phone.replace(/\D/g, '');
        const applicant = {
          name: name.trim(), phone: phoneDigits, gender,
          roundId, roundLabel: round ? round.label : roundId, amount: price,
          companion, companionName: companion ? companionName.trim() : '',
          birthYear, height, charm: charm.trim(), workplace: workplace.trim(), region, avoidName: avoidName.trim(), drink,
          photoUrl, docUrl,
        };
        // 완료 페이지에서 영수증 표시에 쓸 신청자 정보 보관
        sessionStorage.setItem('ul_apply_' + orderId, JSON.stringify(applicant));

        // ── 결제 ON: 토스 결제창 → 성공 시 /success (서버에서 결제검증 + 알림톡) ──
        if (PAYMENT_ENABLED) {
          if (typeof TossPayments !== 'function') { setBusy(false); setErr('결제 모듈을 불러오지 못했어요. 새로고침 후 다시 시도해주세요.'); return; }
          if (!TOSS_CLIENT_KEY || TOSS_CLIENT_KEY.includes('여기에')) { setBusy(false); setErr('⚠ 결제 키가 아직 설정되지 않았어요. (관리자: TOSS_CLIENT_KEY 입력)'); return; }
          if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');
          const toss = TossPayments(TOSS_CLIENT_KEY);
          const payment = toss.payment({ customerKey: TossPayments.ANONYMOUS });
          await payment.requestPayment({
            method: 'CARD',
            amount: { currency: 'KRW', value: price },
            orderId,
            orderName: '언더라이트 ' + (round ? round.label : '') + ' 참가비',
            successUrl: window.location.origin + '/success',
            failUrl: window.location.origin + '/index.html',
            customerName: name.trim(),
            customerMobilePhone: phoneDigits,
          });
          return; // 결제창으로 이동 (성공 시 successUrl 콜백 → /api/confirm)
        }

        // ── 결제 OFF: 결제 없이 즉시 접수 → 자동 알림톡/관리자 문자 ──
        const res = await fetch('/api/apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ orderId, applicant }),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok || !j.success) {
          setBusy(false);
          setErr((j && j.message) || '신청 접수에 실패했어요. 잠시 후 다시 시도해주세요.');
          return;
        }
        // 3) 전환 추적 후 완료 페이지로 이동
        if (typeof fbq === 'function') fbq('track', 'Lead', {}, { eventID: orderId });
        if (typeof gtag === 'function') gtag('event', 'generate_lead', { transaction_id: orderId });
        window.location.href = '/success?applied=1&orderId=' + encodeURIComponent(orderId);
      } catch (e) {
        setBusy(false);
        if (e && e.code === 'USER_CANCEL') return; // 결제창을 닫음 — 조용히
        setErr((e && e.message) || '신청을 접수하지 못했습니다.');
      }
    };

    return (
      <div onClick={onClose}
        style={{position:'fixed', inset:0, zIndex:9999, background:'rgba(10,8,6,.72)', backdropFilter:'blur(3px)',
                display:'flex', alignItems:'flex-end', justifyContent:'center'}}>
        <div onClick={e=>e.stopPropagation()}
          className="bg-ink border-t border-amber/40"
          style={{width:'100%', maxWidth:'440px', borderTopLeftRadius:'28px', borderTopRightRadius:'28px',
                  maxHeight:'92vh', overflowY:'auto', padding:'22px 20px 28px'}}>
          {/* 핸들 */}
          <div style={{width:'44px', height:'5px', background:'rgba(0,0,0,.12)', borderRadius:'999px', margin:'0 auto 18px'}}></div>

          <div className="flex items-center justify-between mb-1">
            <h3 className="text-[20px] font-extrabold text-fg">참가 신청</h3>
            <button onClick={onClose} className="text-muted text-[20px] leading-none w-8 h-8 rounded-full bg-ink2/60 flex items-center justify-center">×</button>
          </div>
          <p className="text-[12.5px] text-muted mb-5">제출하면 입금 계좌를 안내드려요 · 입금 확인 후 참석 확정</p>

          {/* 성별 */}
          <div className="mb-4">
            <div className="text-[12.5px] font-bold text-fg2 mb-2">성별</div>
            <div className="grid grid-cols-2 gap-2.5">
              {[['M','남성'],['F','여성']].map(([g,lbl]) => (
                <button key={g} onClick={()=>setGender(g)}
                  className={"py-3.5 rounded-2xl border-2 text-[14px] font-bold transition " +
                    (gender===g
                      ? (g==='M' ? "border-azure bg-azure/15 text-azure" : "border-ember bg-ember/15 text-ember")
                      : "border-line text-muted bg-ink2/40")}>
                  {lbl}
                </button>
              ))}
            </div>
          </div>

          {/* 이름 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">이름</div>
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="실명을 입력해주세요"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
          </div>

          {/* 전화번호 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">휴대폰 번호</div>
            <input value={phone} onChange={e=>setPhone(fmtPhone(e.target.value))} inputMode="numeric" placeholder="010-0000-0000"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
            <div className="text-[11px] text-muted mt-1.5">매칭·회차 안내가 이 번호의 카카오톡으로 발송됩니다.</div>
          </div>

          {/* 년생 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">년생</div>
            <input value={birthYear} onChange={e=>setBirthYear(e.target.value.replace(/\D/g,'').slice(0,4))} inputMode="numeric" placeholder="예: 1995"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
          </div>

          {/* 키 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">키 (cm)</div>
            <input value={height} onChange={e=>setHeight(e.target.value.replace(/\D/g,'').slice(0,3))} inputMode="numeric" placeholder="예: 175"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
          </div>

          {/* 매력 한마디 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">나를 한마디로 표현하자면?</div>
            <input value={charm} onChange={e=>setCharm(e.target.value.slice(0,30))} placeholder="예: 다정하고 잘 웃어요"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
            <div className="text-[11px] text-muted mt-1.5">라인업에 공개돼요 (최대 30자)</div>
          </div>

          {/* 하는 일 / 공부 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">하는 일 / 공부</div>
            <input value={workplace} onChange={e=>setWorkplace(e.target.value)} placeholder="라인업에 표기됩니다"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
          </div>

          {/* 거주지역 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">거주지역</div>
            <div className="grid grid-cols-4 gap-2">
              {REGIONS.map(rg => (
                <button key={rg} onClick={()=>setRegion(rg)}
                  className={"py-2.5 rounded-xl border-2 text-[12px] font-bold transition " +
                    (region===rg ? "border-amber bg-amber/10 text-amber" : "border-line text-muted bg-ink2/40")}>{rg}</button>
              ))}
            </div>
          </div>

          {/* 음료 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">드시고 싶은 음료</div>
            <div className="grid grid-cols-2 gap-2">
              {DRINKS.map(d => (
                <button key={d} onClick={()=>setDrink(d)}
                  className={"py-2.5 px-2 rounded-xl border-2 text-[12px] font-bold transition " +
                    (drink===d ? "border-amber bg-amber/10 text-amber" : "border-line text-muted bg-ink2/40")}>{d}</button>
              ))}
            </div>
          </div>

          {/* 본인 사진 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">본인 사진</div>
            <FileField file={photoFile} onPick={setPhotoFile} accept="image/*" hint="얼굴이 잘 나온 사진 1장" />
          </div>

          {/* 신원 확인 서류 */}
          <div className="mb-3">
            <div className="text-[12.5px] font-bold text-fg2 mb-0.5">재직증명서 / 사업자등록증</div>
            <div className="text-[11.5px] text-muted mb-1.5">사원증 · 명함 · 급여명세서 대체 가능 · 본인 신원 확인용</div>
            <FileField file={docFile} onPick={setDocFile} accept="image/*,application/pdf" hint="사진 또는 PDF" />
          </div>

          {/* 겹치고 싶지 않은 지인 */}
          <div className="mb-4">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">겹치고 싶지 않은 지인 <span className="text-muted font-normal">(선택)</span></div>
            <input value={avoidName} onChange={e=>setAvoidName(e.target.value)} placeholder="아는 사람과 안 겹치게 — 이름 기입"
              className="w-full bg-ink2/60 border border-line rounded-2xl text-fg text-[14px] px-4 py-3.5 outline-none focus:border-amber/60"/>
          </div>

          {/* 회차 */}
          <div className="mb-4">
            <div className="text-[12.5px] font-bold text-fg2 mb-1.5">참가 회차</div>
            <div className="space-y-2">
              {rounds.map(r => {
                const badge = getRoundBadge(r);
                return (
                  <button key={r.id} disabled={r.soldout} onClick={()=>setRoundId(r.id)}
                    className={"w-full flex items-center justify-between px-4 py-3 rounded-2xl border-2 text-[13px] transition " +
                      (r.soldout ? "border-line text-muted/50 bg-ink2/20 cursor-not-allowed"
                        : roundId===r.id ? "border-amber bg-amber/10 text-amber font-bold"
                        : "border-line text-fg2 bg-ink2/40")}>
                    <div className="flex flex-col items-start gap-0.5">
                      <span>{r.label}</span>
                      {badge && <span className={"text-[11px] font-bold " + (badge.type==='earlybird' ? "text-amber" : "text-ember")}>{badge.text}</span>}
                    </div>
                    {r.soldout
                      ? <span className="text-[11px]">마감</span>
                      : <span className="text-[14px]">{roundId===r.id ? '●' : '○'}</span>}
                  </button>
                );
              })}
            </div>
          </div>

          {/* 동반 참여 */}
          <div className="mb-4 border border-line bg-ink2/40 rounded-2xl p-3.5">
            <label className="flex items-start gap-2 cursor-pointer">
              <input type="checkbox" checked={companion} onChange={e=>setCompanion(e.target.checked)} className="mt-0.5 accent-amber"/>
              <span className="text-[13px] text-fg2 leading-[1.5]">
                <b className="text-amber">친구와 함께 신청</b>해요
                <span className="text-muted"> · 1인당 {COMPANION_DISCOUNT.toLocaleString()}원 할인</span>
              </span>
            </label>
            {companion && (
              <input value={companionName} onChange={e=>setCompanionName(e.target.value)}
                placeholder="같이 오는 분 이름 (선택)"
                className="w-full mt-2.5 bg-ink2/60 border border-line rounded-xl text-fg text-[13px] px-3.5 py-2.5 outline-none focus:border-amber/60"/>
            )}
          </div>

          {/* 금액 요약 */}
          {gender && (
            <div className="mb-4 text-[13px] bg-ink2/50 rounded-2xl px-4 py-3">
              <div className="flex justify-between py-1 text-fg2">
                <span>참가비 ({gender==='M'?'남성':'여성'})</span>
                <span>{basePrice.toLocaleString()}원</span>
              </div>
              {isEarlybird && (
                <div className="flex justify-between py-1 text-amber">
                  <span>‼️ 얼리버드 할인</span>
                  <span>-{EARLYBIRD_DISCOUNT.toLocaleString()}원</span>
                </div>
              )}
              {companion && (
                <div className="flex justify-between py-1 text-amber">
                  <span>동반 할인</span>
                  <span>-{COMPANION_DISCOUNT.toLocaleString()}원</span>
                </div>
              )}
              <div className="flex justify-between py-2 mt-1 border-t border-line font-bold text-fg text-[15px]">
                <span>최종 결제금액</span>
                <span>{price.toLocaleString()}원</span>
              </div>
            </div>
          )}

          {/* 동의 1: 파티 이용 약관 */}
          <div className="mb-3 border border-line rounded-2xl p-4">
            <div className="text-[13px] font-bold text-fg mb-2">파티 이용 약관에 동의해주세요 <span className="text-ember">*</span></div>
            <ul className="text-[11.5px] text-muted leading-[1.65] space-y-1.5 mb-3">
              <li>▶ 예정일 D-7부터 환불 및 날짜 변경은 불가합니다.</li>
              <li>▶ 진행 중 스탭이 현장을 촬영하며 홍보에 활용될 수 있습니다. 얼굴이 노출되지 않도록 모자이크(블러) 처리합니다.</li>
              <li>▶ 행사 중 발생한 사고의 민·형사상 책임은 본인에게 있으며, 물품 손괴 시 원가배상을 원칙으로 합니다.</li>
            </ul>
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={agreeParty} onChange={e=>setAgreeParty(e.target.checked)} className="accent-amber"/>
              <span className="text-[12.5px] text-fg2 font-bold">예, 동의합니다</span>
            </label>
          </div>

          {/* 동의 2: 개인정보 수집·이용 */}
          <div className="mb-4 border border-line rounded-2xl p-4">
            <div className="text-[13px] font-bold text-fg mb-2">개인정보 수집 및 이용에 관한 동의 <span className="text-ember">*</span></div>
            <ul className="text-[11.5px] text-muted leading-[1.65] space-y-1.5 mb-3">
              <li>▶ 수집·이용 목적: 소개팅 진행 및 CS 안내 등</li>
              <li>▶ 수집 항목: 신청서 내 항목</li>
              <li>▶ 보유·이용 기간: 선발자 안내 후 3년</li>
              <li>▶ 마케팅 활용·광고 수신: 이벤트 소식·빈자리 알림·고객 혜택 등</li>
            </ul>
            <label className="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" checked={agreePrivacy} onChange={e=>setAgreePrivacy(e.target.checked)} className="accent-amber"/>
              <span className="text-[12.5px] text-fg2 font-bold">예, 동의합니다</span>
            </label>
          </div>

          {/* 참가비 — 맨 아래에서 안내 */}
          {gender && (
            <div className="flex items-center justify-between mb-3 px-1.5 py-3 border-t border-line">
              <span className="text-[13px] text-fg2 font-bold">참가비</span>
              <span className="text-right">
                <span className="text-[18px] text-amber font-extrabold">{price.toLocaleString()}원</span>
                {isEarlybird && <span className="block text-[11px] text-amber mt-0.5">‼️ 얼리버드 3,000원 할인 적용</span>}
                {companion && <span className="block text-[11px] text-muted mt-0.5">동반 할인 3,000원 적용</span>}
              </span>
            </div>
          )}

          {err && <div className="text-[12px] text-ember bg-ember/10 border border-ember/30 rounded-xl px-3.5 py-2.5 mb-3">{err}</div>}

          {/* 결제 버튼 */}
          <button onClick={pay} disabled={busy}
            className={"w-full py-4 rounded-full font-extrabold text-[15px] flex items-center justify-center gap-2 transition " +
              (valid && !busy ? "bg-amber text-deep active:scale-[0.98] shadow-[0_6px_18px_rgba(199,120,0,.28)]" : "bg-amber/40 text-deep/60")}>
            {busy ? (PAYMENT_ENABLED ? '결제 준비 중…' : '접수 중…')
              : !gender ? '성별을 먼저 선택해주세요'
              : PAYMENT_ENABLED ? ((price ? price.toLocaleString() + '원 · ' : '') + '안전하게 결제하기')
              : '신청하기'}
          </button>
          <div className="text-[11px] text-muted text-center mt-3">
            {PAYMENT_ENABLED ? '토스페이먼츠 안전결제 · 카드 / 간편결제' : '제출 후 계좌 안내 · 입금하면 참석 확정'}
          </div>
        </div>
      </div>
    );
  }

  /* ─────── App ─────── */
  function App(){
    useReveal();
    const [applyOpen, setApplyOpen] = useState(false);
    // 신청하기 → Tally 폼으로 이동 (같은 탭). TALLY_URL은 상단(전역)에 정의됨.
    const cta = () => {
      if (typeof fbq === 'function') fbq('track', 'InitiateCheckout');
      if (typeof gtag === 'function') gtag('event', 'begin_checkout', { value: 1, currency: 'KRW' });
      if (SIGNUP_MODE === 'card') { setApplyOpen(true); return; }
      window.location.href = TALLY_URL;
    };

    return (
      <>
        <div className="page-shell">

          <Lineup />
          <CardImages />
          <Programs />
          <Host />
          <Urgency onCTA={cta} />
          <MiniFAQ />
          <Foot />
        </div>
        <Sticky onCTA={cta} />
        <ApplyModal open={applyOpen} onClose={()=>setApplyOpen(false)} />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>


</body></html>
