<script type="text/babel" data-presets="env,react">
  const { useState, useEffect, useRef, useMemo } = React;

  const TALLY_URL = "https://smore.im/form/O5Yn3foBzs";

  /* ─────── Reveal hook (with safe fallback) ─────── */
  function useReveal(){
    useEffect(()=>{
      const els = Array.from(document.querySelectorAll('.reveal'));
      els.forEach(el => el.classList.add('pre'));
      const showAll = () => els.forEach(el => { el.classList.remove('pre'); el.classList.add('in'); });
      const fallback = setTimeout(showAll, 1400);
      try {
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => {
            if(e.isIntersecting){
              e.target.classList.remove('pre'); e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold:.06, rootMargin:'0px 0px -8% 0px' });
        els.forEach(el => io.observe(el));
        return () => { clearTimeout(fallback); io.disconnect(); }
      } catch(e){ showAll(); return () => clearTimeout(fallback); }
    },[]);
  }

  /* ─────── Countdown to next Friday 19:00 ─────── */
  function useCountdown(){
    const target = useMemo(()=>{
      const now = new Date();
      const d = new Date(now);
      const day = now.getDay(); // 0 Sun .. 5 Fri
      let add = (5 - day + 7) % 7;
      if(add === 0 && now.getHours() >= 19) add = 7;
      d.setDate(now.getDate() + add);
      d.setHours(19,0,0,0);
      return d;
    },[]);
    const [now, setNow] = useState(Date.now());
    useEffect(()=>{ const i = setInterval(()=>setNow(Date.now()), 1000); return ()=>clearInterval(i); },[]);
    const diff = Math.max(0, target - now);
    const d = Math.floor(diff/86400000);
    const h = Math.floor(diff/3600000) % 24;
    const m = Math.floor(diff/60000) % 60;
    const s = Math.floor(diff/1000) % 60;
    return { d, h, m, s, target };
  }

        </p>

        {/* Countdown */}
        <div className="grid grid-cols-4 gap-2 mb-5">
          {[['DAYS', c.d],['HRS', c.h],['MIN', c.m],['SEC', c.s]].map(([l,v],i)=>(
            <div key={l} className="bg-ink2 border border-line px-2 py-3 text-center">
              <div className={"font-mono font-bold text-[26px] text-fg " + (i===3 ? 'text-amber' : '')}>{pad(v)}</div>
              <div className="text-[9px] text-muted font-mono tracking-[0.16em] mt-1">{l}</div>

        {/* Spots meter */}
        <div className="bg-ink2 border border-line p-4 mb-6">

        {/* Incentives */}
        <div className="border border-amber/40 bg-amber/5 p-5 rounded-md">
          <div className="text-[10.5px] text-amber font-mono uppercase tracking-[0.16em] mb-3">지금 신청 시</div>

      ['술 못 마셔도 괜찮나요?', '와인 대신 무알콜 시그니처가 동일하게 제공됩니다.'],
      ['일산 어디서 모이나요?', '백석역 5분 내 거리라 찾아오시기 편할 거예요. 신청해 주시면 정확한 위치를 바로 안내해 드리겠습니다.'],
    ];
    const [open, setOpen] = useState(0);
    return (
      <section className="reveal px-5 py-12" data-screen-label="07 FAQ">
        <h3 className="text-[15px] text-muted font-mono uppercase tracking-[0.16em] mb-4">FAQ</h3>
        <div className="border-t border-line">
          {items.map(([q,a],i)=>{
            const isOpen = open===i;
            return (
              <div key={i} className="border-b border-line cursor-pointer" onClick={()=>setOpen(isOpen ? -1 : i)}>
                <div className="flex items-center justify-between py-4">
                  <div className="text-[14px] text-fg font-medium">{q}</div>
                  <div className={"text-[18px] leading-none transition " + (isOpen ? 'rotate-45 text-amber' : 'text-muted')}>+</div>
                </div>
                <div className={"overflow-hidden transition-all duration-300 " + (isOpen ? 'max-h-40' : 'max-h-0')}>
                  <div className="pb-4 pr-6 text-[13px] text-fg2 leading-[1.7]">{a}</div>
                </div>
              </div>
            );
          })}
        </div>
      </section>
    );
  }

  function FinalCTA({ onCTA }){

        <div className="text-center">
          <div className="text-[11px] text-amber font-mono uppercase tracking-[0.2em] mb-4">JOIN US</div>

            신청서 작성하기 →

          <div className="mt-4 text-[11px] text-muted font-mono">
            응답 시간 약 1분 · 결제 없음
          </div>
        </div>
      </section>
    );
  }

  /* ─────── Footer ─────── */
  function Foot(){
    return (
      <footer className="px-5 py-10 border-t border-line text-center" style={{paddingBottom:'140px'}}>
        <div className="font-display text-amber text-[24px] tracking-[0.06em]">UNDERLIGHT</div>
        <div className="mt-2 text-[11px] text-muted font-mono uppercase tracking-[0.16em]">일산 · 파주 · 김포</div>
        <div className="mt-4 text-[10.5px] text-dim leading-[1.7]">

  function Sticky({ onCTA }){
    return (
      <div className="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-50 cta-veil pt-6 pb-4 px-3 pointer-events-none">
        <div className="pointer-events-auto bg-ink2/90 backdrop-blur-md border border-line rounded-md p-2 flex items-center gap-2 shadow-2xl">
          <div className="px-3 flex-1 min-w-0">

              <span className="text-dim text-[11px] line-through font-mono">49,000</span>
              <span className="text-amber font-mono">36,800<span className="text-[11px] text-muted">원</span></span>
            </div>

          <button onClick={onCTA}
            className="pulse shimmer flex-shrink-0 bg-amber text-deep font-bold text-[13px] tracking-[0.04em] py-3 px-5 rounded">

    if(!open) return null;

      <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm pop-in" onClick={onClose}>

          <Stats />

          <Urgency onCTA={cta} />

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
